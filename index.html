<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

  <div class="bg-white shadow-xl rounded-2xl p-6 sm:p-8 w-full max-w-md">

    <!-- Logo + Title -->
    <div class="text-center mb-6">
      <div class="flex justify-center mb-3">
        <img src="logo.svg" alt="Company Logo" class="h-12 sm:h-16 object-contain drop-shadow-sm">
      </div>
      <h2 class="text-xl sm:text-2xl font-bold text-gray-800">💬 Your Feedback</h2>
      <p class="text-gray-500 text-sm mt-1">We value your opinion 🙏</p>
    </div>

    <!-- Netlify Form -->
    <form name="review" method="POST" data-netlify="true" id="reviewForm" class="space-y-4">
      <input type="hidden" name="form-name" value="review">
      <input type="text" name="bot-field" hidden>

      <input type="text" name="name" placeholder="Your name (optional)"
        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">

      <select name="rating" required
        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
        <option value="">⭐ Select rating</option>
        <option>5 - Excellent</option>
        <option>4 - Good</option>
        <option>3 - Average</option>
        <option>2 - Poor</option>
        <option>1 - Bad</option>
      </select>

      <textarea name="message" placeholder="Write your review..." required
        class="w-full p-3 border rounded-lg h-28 sm:h-32 focus:ring-2 focus:ring-blue-500"></textarea>

      <button type="submit"
        class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">
        Submit Review
      </button>
    </form>

    <!-- Inline thank you message (hidden by default) -->
    <div id="thankYouMessage" class="hidden text-center mt-6">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Thank You! 🙏</h2>
      <p class="text-gray-500">Your review has been submitted successfully.</p>
    </div>

  </div>

  <script>
    // Handle form submit
    const form = document.getElementById('reviewForm');
    form.addEventListener('submit', function(event) {
      event.preventDefault(); // prevent default redirect
      const data = new FormData(form);

      // Send via Netlify fetch
      fetch('/', {
        method: 'POST',
        body: data,
      }).then(() => {
        // Hide form and show thank-you
        form.style.display = 'none';
        document.getElementById('thankYouMessage').classList.remove('hidden');
      }).catch((error) => {
        alert('Form submission failed! ' + error);
      });
    });
  </script>
</body>
</html>
