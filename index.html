<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden { display: none; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

  <div class="bg-white shadow-xl rounded-2xl p-6 sm:p-8 w-full max-w-md">

    <div class="text-center mb-6">
      <div class="flex justify-center mb-3">
        <img src="logo.svg" alt="Company Logo" class="h-12 sm:h-16 object-contain drop-shadow-sm">
      </div>
      <h2 class="text-xl sm:text-2xl font-bold text-gray-800">💬 Your Feedback</h2>
      <p class="text-gray-500 text-sm mt-1">We value your opinion 🙏</p>
    </div>

    <form id="review-form" name="review" data-netlify="true" class="space-y-4">
      <input type="hidden" name="form-name" value="review">
      <p class="hidden">
        <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
      </p>

      <input type="text" name="name" placeholder="Your name (optional)"
        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

      <select name="rating" required
        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        <option value="">⭐ Select rating</option>
        <option>5 - Excellent</option>
        <option>4 - Good</option>
        <option>3 - Average</option>
        <option>2 - Poor</option>
        <option>1 - Bad</option>
      </select>

      <textarea name="message" placeholder="Write your review..." required
        class="w-full p-3 border rounded-lg h-28 sm:h-32 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>

      <button type="submit" id="submit-btn"
        class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition font-semibold">
        Submit Review
      </button>
    </form>

    <div id="success-message" class="hidden text-center py-8">
      <div class="text-5xl mb-4">✅</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Thank You!</h2>
      <p class="text-gray-500 mb-6">Your review has been submitted successfully.</p>
      <button onclick="location.reload()" class="text-blue-600 font-medium hover:underline">
        Submit another review
      </button>
    </div>

  </div>

  <script>
    const form = document.getElementById('review-form');
    const successMsg = document.getElementById('success-message');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      submitBtn.innerText = "Sending...";

      const formData = new FormData(form);
      
      fetch("/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams(formData).toString(),
      })
      .then((response) => {
        if (response.ok) {
          form.classList.add('hidden');
          successMsg.classList.remove('hidden');
        } else {
          throw new Error('Network response was not ok');
        }
      })
      .catch((error) => {
        alert("Submission failed. Please try again.");
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Review";
      });
    });
  </script>
</body>
</html>
